services:
  courtlistener-mcp:
    build: .
    ports:
      - "8000:8000"
    environment:
      - COURTLISTENER_API_TOKEN=${COURTLISTENER_API_TOKEN}
      - TRANSPORT=http
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ui-host:
    build: ./ui-host
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      # Must be localhost — this URL is used by the browser, not inside Docker
      - SERVERS=["http://localhost:8000/mcp"]
    depends_on:
      courtlistener-mcp:
        condition: service_healthy
    restart: unless-stopped
